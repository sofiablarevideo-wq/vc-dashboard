<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Загрузка команды</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#f4f2ee;--s1:#ffffff;--s2:#ece9e3;--s3:#e0ddd7;
  --b1:rgba(0,0,0,.07);--b2:rgba(0,0,0,.12);
  --t1:#18171a;--t2:rgba(24,23,26,.5);--t3:rgba(24,23,26,.28);
  --green:#16a34a;--green-bg:rgba(22,163,74,.08);--green-b:rgba(22,163,74,.2);
  --amber:#d97706;--amber-bg:rgba(217,119,6,.08);--amber-b:rgba(217,119,6,.2);
  --red:#dc2626;--red-bg:rgba(220,38,38,.08);--red-b:rgba(220,38,38,.2);
  --blue:#4f46e5;--blue-bg:rgba(79,70,229,.08);--blue-b:rgba(79,70,229,.2);
  --r:8px;
}
body{background:var(--bg);color:var(--t1);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:14px;line-height:1.5;min-height:100vh;}
button{font-family:inherit;cursor:pointer;}

/* ── HEADER ── */
.hdr{display:flex;align-items:center;gap:12px;padding:14px 24px;border-bottom:1px solid var(--b1);position:sticky;top:0;z-index:50;background:var(--bg);flex-wrap:wrap;}
.hdr-title{font-size:15px;font-weight:600;letter-spacing:-.02em;margin-right:4px;}
.hdr-sub{font-size:11px;color:var(--t3);margin-right:auto;}
.sync-dot{width:6px;height:6px;border-radius:50%;background:var(--green);flex-shrink:0;}
.sync-dot.err{background:var(--red);}
.sync-txt{font-size:11px;color:var(--t2);}

.week-nav{display:flex;align-items:center;background:var(--s1);border:1px solid var(--b2);border-radius:var(--r);overflow:hidden;}
.week-nav button{background:none;border:none;color:var(--t2);padding:6px 12px;font-size:13px;transition:color .15s;}
.week-nav button:hover{color:var(--t1);}
.week-lbl{font-size:12px;color:var(--t1);padding:0 10px;white-space:nowrap;font-variant-numeric:tabular-nums;}

.btn{border:none;border-radius:var(--r);padding:7px 14px;font-size:12px;font-weight:500;cursor:pointer;white-space:nowrap;transition:opacity .15s;}
.btn-primary{background:var(--blue);color:#fff;}
.btn-primary:hover{opacity:.85;}
.btn-ghost{background:var(--s2);border:1px solid var(--b2);color:var(--t2);}
.btn-ghost:hover{color:var(--t1);}
.btn-danger{background:var(--red-bg);border:1px solid var(--red-b);color:var(--red);}

/* ── DEPT TABS ── */
.dept-bar{display:flex;gap:2px;padding:0 24px;border-bottom:1px solid var(--b1);background:var(--bg);position:sticky;top:53px;z-index:40;overflow-x:auto;}
.dept-tab{background:none;border:none;border-bottom:2px solid transparent;color:var(--t2);padding:11px 16px;font-size:12px;font-weight:500;white-space:nowrap;transition:color .15s,border-color .15s;}
.dept-tab:hover{color:var(--t1);}
.dept-tab.active{color:var(--t1);border-bottom-color:var(--blue);}
.dept-badge{display:inline-flex;align-items:center;justify-content:center;background:var(--s2);color:var(--t2);border-radius:10px;font-size:10px;padding:1px 6px;margin-left:5px;min-width:18px;}
.dept-tab.active .dept-badge{background:var(--blue-bg);color:var(--blue);}

/* ── SUMMARY ── */
.summary{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;padding:16px 24px;}
.sum-card{background:var(--s1);border:1px solid var(--b1);border-radius:var(--r);padding:14px 16px;}
.sum-lbl{font-size:10px;color:var(--t3);text-transform:uppercase;letter-spacing:.07em;margin-bottom:6px;}
.sum-val{font-size:22px;font-weight:600;font-variant-numeric:tabular-nums;letter-spacing:-.03em;}
.sum-sub{font-size:11px;color:var(--t2);margin-top:3px;}
.load-track{height:3px;background:var(--b2);border-radius:2px;margin-top:8px;overflow:hidden;}
.load-fill{height:100%;border-radius:2px;transition:width .5s;}

/* ── MAIN ── */
.main{padding:0 24px 40px;}
.toolbar{display:flex;align-items:center;gap:8px;margin:14px 0 12px;flex-wrap:wrap;}
.view-switch{display:flex;background:var(--s2);border:1px solid var(--b1);border-radius:var(--r);padding:2px;gap:2px;}
.view-btn{background:none;border:none;color:var(--t2);padding:5px 14px;font-size:12px;font-weight:500;border-radius:6px;transition:all .15s;}
.view-btn.active{background:var(--s3);color:var(--t1);}
.view-btn:hover:not(.active){color:var(--t1);}
.expand-all{background:none;border:1px solid var(--b2);border-radius:var(--r);color:var(--t2);padding:5px 12px;font-size:11px;}
.expand-all:hover{color:var(--t1);}

/* ── PERSON CARD ── */
.person-card{background:var(--s1);border:1px solid var(--b1);border-radius:var(--r);margin-bottom:6px;overflow:hidden;transition:border-color .2s;}
.person-card.overload{border-color:var(--red-b);}
.person-card.warn{border-color:var(--amber-b);}

.person-hdr{display:flex;align-items:center;gap:10px;padding:12px 16px;cursor:pointer;user-select:none;}
.person-hdr:hover{background:rgba(255,255,255,.02);}
.avatar{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;letter-spacing:-.03em;}
.person-name{font-size:13px;font-weight:500;}
.person-meta{font-size:11px;color:var(--t2);margin-top:1px;}
.person-meta .badge{display:inline-flex;align-items:center;gap:3px;padding:1px 7px;border-radius:10px;font-size:10px;font-weight:500;margin-left:5px;}
.badge-amber{background:var(--amber-bg);color:var(--amber);border:1px solid var(--amber-b);}
.badge-gray{background:var(--s2);color:var(--t2);border:1px solid var(--b1);}
.badge-red{background:var(--red-bg);color:var(--red);border:1px solid var(--red-b);}

/* Week load bar in header */
.week-bar{display:flex;align-items:center;gap:8px;margin-left:auto;flex-shrink:0;}
.week-days-mini{display:flex;gap:3px;}
.day-mini{width:28px;text-align:center;}
.day-mini-lbl{font-size:9px;color:var(--t3);margin-bottom:3px;}
.day-mini-bar{height:28px;border-radius:4px;background:var(--s3);position:relative;overflow:hidden;}
.day-mini-fill{position:absolute;bottom:0;left:0;right:0;border-radius:4px;transition:height .4s;}
.day-mini-h{font-size:9px;color:var(--t2);text-align:center;margin-top:2px;font-variant-numeric:tabular-nums;}

.status-pill{font-size:10px;font-weight:600;padding:3px 10px;border-radius:20px;white-space:nowrap;margin-left:8px;}
.pill-green{background:var(--green-bg);color:var(--green);border:1px solid var(--green-b);}
.pill-amber{background:var(--amber-bg);color:var(--amber);border:1px solid var(--amber-b);}
.pill-red{background:var(--red-bg);color:var(--red);border:1px solid var(--red-b);}
.pill-gray{background:var(--s2);color:var(--t2);border:1px solid var(--b1);}
.chevron{font-size:10px;color:var(--t3);transition:transform .2s;margin-left:4px;}
.person-card.collapsed .chevron{transform:rotate(-90deg);}

/* ── PERSON BODY ── */
.person-body{border-top:1px solid var(--b1);}
.person-body.hidden{display:none;}

/* Day headers */
.days-hdr{display:grid;grid-template-columns:120px repeat(5,1fr);gap:1px;padding:0 16px;background:var(--s1);}
.day-col-hdr{padding:8px 10px;text-align:center;border-left:1px solid var(--b1);}
.day-col-hdr:first-child{border-left:none;}
.day-hdr-name{font-size:10px;color:var(--t3);text-transform:uppercase;letter-spacing:.06em;}
.day-hdr-date{font-size:12px;font-weight:500;margin-top:1px;}
.day-hdr-load{font-size:11px;font-variant-numeric:tabular-nums;margin-top:2px;}
.day-hdr-pct{font-size:10px;color:var(--t2);margin-top:1px;}
.day-hdr-bar{height:2px;border-radius:1px;margin-top:5px;overflow:hidden;background:var(--b2);}
.day-hdr-bar-fill{height:100%;border-radius:1px;}
.day-col-hdr.today{background:rgba(129,140,248,.04);}
.day-col-hdr.past{opacity:.4;}
.day-col-hdr.no-work{background:rgba(255,255,255,.01);opacity:.3;}

/* Gantt area */
.gantt-area{padding:10px 16px 14px;position:relative;}
.gantt-grid{display:grid;grid-template-columns:120px repeat(5,1fr);gap:0;position:relative;}
.gantt-label-col{display:flex;flex-direction:column;gap:2px;padding-right:8px;}
.gantt-task-label{height:28px;display:flex;align-items:center;font-size:11px;color:var(--t2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;cursor:pointer;}
.gantt-task-label:hover{color:var(--t1);}
.gantt-day-col{position:relative;border-left:1px solid var(--b1);min-height:28px;}
.gantt-day-col.today{background:rgba(129,140,248,.03);}
.gantt-day-col.past{background:rgba(0,0,0,.15);}
.gantt-bar-wrap{display:flex;flex-direction:column;gap:2px;padding:0 3px;}
.gantt-bar{height:24px;border-radius:4px;display:flex;align-items:center;padding:0 7px;overflow:hidden;cursor:pointer;margin-top:2px;transition:opacity .15s;position:relative;}
.gantt-bar:hover{opacity:.85;}
.gantt-bar-name{font-size:10px;font-weight:600;color:rgba(0,0,0,.8);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1;}
.gantt-bar-h{font-size:9px;color:rgba(0,0,0,.55);flex-shrink:0;margin-left:4px;font-variant-numeric:tabular-nums;}
.gantt-bar.fire::before{content:'🔥';font-size:9px;margin-right:3px;}
.gantt-empty{font-size:11px;color:var(--t3);padding:10px 0 4px;text-align:center;grid-column:1/-1;}

/* Approval / postponed info */
.info-row{display:flex;gap:6px;flex-wrap:wrap;padding:0 16px 12px;}
.info-chip{display:flex;align-items:center;gap:5px;padding:5px 10px;border-radius:6px;font-size:11px;}
.chip-amber{background:var(--amber-bg);border:1px solid var(--amber-b);color:var(--amber);}
.chip-gray{background:var(--s2);border:1px solid var(--b1);color:var(--t2);}

/* ── OVERVIEW ── */
.overview-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:10px;padding:16px 0;}
.ov-dept-card{background:var(--s1);border:1px solid var(--b1);border-radius:var(--r);padding:16px;}
.ov-dept-title{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.08em;color:var(--t2);margin-bottom:12px;}
.ov-person{display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid var(--b1);cursor:pointer;}
.ov-person:last-child{border-bottom:none;}
.ov-person:hover .ov-name{color:var(--t1);}
.ov-avatar{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;flex-shrink:0;}
.ov-name{font-size:12px;font-weight:500;flex:1;color:var(--t2);}
.ov-bar{width:60px;height:4px;background:var(--b2);border-radius:2px;overflow:hidden;}
.ov-bar-fill{height:100%;border-radius:2px;}
.ov-pct{font-size:10px;color:var(--t2);min-width:30px;text-align:right;font-variant-numeric:tabular-nums;}
.ov-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;}

/* ── MODAL ── */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:100;align-items:center;justify-content:center;backdrop-filter:blur(3px);}
.overlay.open{display:flex;}
.modal{background:var(--s1);border:1px solid var(--b2);border-radius:12px;padding:24px;width:440px;max-width:95vw;max-height:90vh;overflow-y:auto;}
.modal h3{font-size:15px;font-weight:600;margin-bottom:16px;}
.form-group{margin-bottom:12px;}
.form-lbl{font-size:10px;color:var(--t2);text-transform:uppercase;letter-spacing:.06em;margin-bottom:5px;display:block;}
.form-input,.form-select{width:100%;background:var(--s2);border:1px solid var(--b2);border-radius:var(--r);color:var(--t1);font-family:inherit;font-size:13px;padding:8px 12px;outline:none;transition:border-color .15s;}
.form-input:focus,.form-select:focus{border-color:var(--blue);}
.form-select option{background:#222;}
.modal-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.modal-actions{display:flex;gap:8px;margin-top:16px;}
.btn-cancel{flex:1;background:var(--s2);border:1px solid var(--b2);color:var(--t2);border-radius:var(--r);padding:9px;font-size:13px;}
.btn-cancel:hover{color:var(--t1);}
.btn-save{flex:2;background:var(--blue);border:none;color:#fff;border-radius:var(--r);padding:9px;font-size:13px;font-weight:500;}
.btn-save:hover{opacity:.88;}

/* Task popup */
.task-popup-modal{width:480px;}
.tp-header{display:flex;align-items:flex-start;gap:10px;margin-bottom:16px;}
.tp-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;margin-top:4px;}
.tp-title{font-size:15px;font-weight:600;line-height:1.3;flex:1;}
.tp-badges{display:flex;gap:6px;flex-wrap:wrap;margin-top:6px;}
.tp-badge{font-size:10px;padding:2px 8px;border-radius:10px;border:1px solid;}
.tp-week{background:var(--s2);border-radius:8px;padding:12px 14px;margin-bottom:12px;}
.tp-week-lbl{font-size:10px;color:var(--t3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px;}
.tp-day-row{display:flex;align-items:center;gap:8px;padding:3px 0;font-size:11px;}
.tp-day-name{color:var(--t2);width:24px;flex-shrink:0;}
.tp-day-bar{flex:1;height:3px;background:var(--b2);border-radius:2px;overflow:hidden;}
.tp-day-fill{height:100%;border-radius:2px;}
.tp-day-h{color:var(--t2);width:36px;text-align:right;font-variant-numeric:tabular-nums;}
.tp-actions{display:flex;gap:6px;margin-top:14px;padding-top:14px;border-top:1px solid var(--b1);flex-wrap:wrap;}
.tp-action-btn{background:var(--s2);border:1px solid var(--b2);color:var(--t2);border-radius:var(--r);padding:6px 13px;font-size:12px;}
.tp-action-btn:hover{color:var(--t1);}
.tp-action-btn.amber{background:var(--amber-bg);border-color:var(--amber-b);color:var(--amber);}
.tp-action-btn.green{background:var(--green-bg);border-color:var(--green-b);color:var(--green);}
.tp-action-btn.blue{background:var(--blue-bg);border-color:var(--blue-b);color:var(--blue);}
.tp-dl-row{display:flex;align-items:center;gap:10px;margin-top:10px;}
.tp-dl-row label{font-size:11px;color:var(--t2);flex-shrink:0;}

/* Bitrix modal */
.bx-step{display:none;}
.bx-step.active{display:block;}
.bx-info{background:var(--blue-bg);border:1px solid var(--blue-b);border-radius:var(--r);padding:10px 13px;font-size:12px;color:var(--blue);line-height:1.6;margin-bottom:14px;}
.import-list{max-height:280px;overflow-y:auto;margin:8px 0;}
.import-row{display:flex;align-items:center;gap:9px;padding:8px 0;border-bottom:1px solid var(--b1);font-size:12px;}
.import-row:last-child{border-bottom:none;}
.import-row input[type=checkbox]{accent-color:var(--blue);width:14px;height:14px;}
.import-info{flex:1;}
.import-name{color:var(--t1);}
.import-meta{font-size:10px;color:var(--t2);margin-top:2px;}
.dept-group-row{display:grid;grid-template-columns:1fr 1fr;align-items:center;padding:7px 12px;border-bottom:1px solid var(--b1);}
.dept-group-row:last-child{border-bottom:none;}
.dept-group-label{font-size:12px;color:var(--t2);}
.spinner{display:inline-block;width:14px;height:14px;border:2px solid var(--b2);border-top-color:var(--blue);border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-right:6px;}
@keyframes spin{to{transform:rotate(360deg);}}

/* Team modal */
.team-row{display:flex;align-items:center;gap:9px;padding:8px 0;border-bottom:1px solid var(--b1);}
.team-row:last-child{border-bottom:none;}

/* Toast */
#toast{position:fixed;bottom:20px;right:20px;background:var(--s2);border:1px solid var(--b2);color:var(--t1);border-radius:var(--r);padding:9px 14px;font-size:12px;z-index:200;opacity:0;transition:opacity .3s;pointer-events:none;}
#toast.show{opacity:1;}

/* Loading */
#loader{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;z-index:999;}
#loader .sp{width:24px;height:24px;border:2px solid var(--b2);border-top-color:var(--blue);border-radius:50%;animation:spin .7s linear infinite;}

@media(max-width:700px){
  .hdr{padding:12px 16px;}
  .summary{grid-template-columns:1fr 1fr;padding:12px 16px;}
  .main{padding:0 16px 40px;}
  .dept-bar{padding:0 16px;}
  .days-hdr,.gantt-grid{grid-template-columns:80px repeat(5,1fr);}
  .gantt-label-col{padding-right:4px;}
}
</style>
</head>
<body>

<!-- HEADER -->
<header class="hdr">
  <span class="hdr-title" id="hdr-title">Загрузка команды</span>
  <span class="hdr-sub" id="hdr-sub">обновлено —</span>
  <span class="sync-dot" id="sync-dot"></span>
  <span class="sync-txt" id="sync-txt">загрузка</span>
  <div class="week-nav">
    <button onclick="changeWeek(-1)">←</button>
    <span class="week-lbl" id="week-lbl">—</span>
    <button onclick="changeWeek(1)">→</button>
  </div>
  <button class="btn btn-primary" onclick="openBx()">⬇ Битрикс24</button>
  <button class="btn btn-ghost" onclick="openTeam()">👥 Команда</button>
  <button class="btn btn-danger" onclick="clearAll()">🗑 Очистить</button>
</header>

<!-- DEPT TABS -->
<nav class="dept-bar" id="dept-bar"></nav>

<!-- SUMMARY -->
<div class="summary" id="summary"></div>

<!-- MAIN -->
<div class="main">
  <div class="toolbar">
    <div class="view-switch">
      <button class="view-btn active" id="vb-week" onclick="setView('week')">Неделя</button>
      <button class="view-btn" id="vb-month" onclick="setView('month')">Месяц</button>
    </div>
    <button class="expand-all" id="expand-btn" onclick="toggleAll()">Развернуть все</button>
  </div>
  <div id="main-content"></div>
</div>

<!-- ══ MODALS ══ -->

<!-- Bitrix -->
<div class="overlay" id="modal-bx" onclick="closeOut(event,'modal-bx')">
  <div class="modal" style="width:500px;max-height:90vh;overflow-y:auto;">
    <h3>Импорт из Битрикс24</h3>
    <div class="bx-step active" id="bx-s1">
      <div class="bx-info">Введите URL вебхука и ID групп по отделам.<br>Найти ID: открой группу → число в URL <code>group/<b>42</b>/</code></div>
      <div class="form-group"><label class="form-lbl">URL вебхука</label><input class="form-input" id="bx-url" placeholder="https://company.bitrix24.ru/rest/1/TOKEN/"></div>
      <div class="form-group">
        <label class="form-lbl">ID групп по отделам</label>
        <div id="bx-dept-groups" style="background:var(--s2);border:1px solid var(--b2);border-radius:var(--r);overflow:hidden;"></div>
      </div>
      <div class="form-group"><label class="form-lbl">Период (дней вперёд)</label>
        <select class="form-select" id="bx-days"><option value="14">14 дней</option><option value="30" selected>30 дней</option><option value="60">60 дней</option><option value="90">90 дней</option></select>
      </div>
      <div class="modal-actions">
        <button class="btn-cancel" onclick="closeModal('modal-bx')">Отмена</button>
        <button class="btn-save" onclick="bxLoad()">Загрузить →</button>
      </div>
    </div>
    <div class="bx-step" id="bx-s2"><div style="text-align:center;padding:30px 0;font-size:13px;color:var(--t2);"><span class="spinner"></span>Загружаем из Битрикс24...</div></div>
    <div class="bx-step" id="bx-s3">
      <div class="form-group"><label class="form-lbl">Привязка сотрудников Битрикс → дашборд</label><div id="bx-user-map"></div></div>
      <div style="border-top:1px solid var(--b1);margin:10px 0;"></div>
      <label style="display:flex;align-items:center;gap:7px;font-size:11px;color:var(--t2);margin-bottom:7px;cursor:pointer;"><input type="checkbox" id="bx-all" onchange="bxSelAll(this)" style="accent-color:var(--blue);"> Выбрать все</label>
      <div class="import-list" id="bx-task-list"></div>
      <div class="modal-actions">
        <button class="btn-cancel" onclick="bxStep(1)">← Назад</button>
        <button class="btn-save" onclick="bxImport()">Импортировать</button>
      </div>
    </div>
    <div class="bx-step" id="bx-s4">
      <div style="text-align:center;padding:24px 0;color:var(--green);font-size:14px;" id="bx-done">✓ Готово!</div>
      <div class="modal-actions"><button class="btn-save" onclick="closeModal('modal-bx')">Закрыть</button></div>
    </div>
  </div>
</div>

<!-- Task popup -->
<div class="overlay" id="modal-task" onclick="closeOut(event,'modal-task')">

// UTILS

const fmt = d => d.toISOString().slice(0,10);
const today = () => { const d=new Date(); d.setHours(0,0,0,0); return d; };
const todayStr = () => fmt(today());

// Day closes at 7am — so if now is after 7am, today's plan is "current"
// Day becomes past when it's actually yesterday or earlier
function isPast(dateStr){
  return dateStr < todayStr();
}
function isToday(dateStr){ return dateStr === todayStr(); }

function fmtH(h){
  if(!h||h<=0) return '—';
  const hrs=Math.floor(h), mins=Math.round((h-hrs)*60);
  if(hrs===0) return mins+' мин';
  if(mins===0) return hrs+' ч';
  return hrs+' ч '+mins+' мин';
}
function fmtDate(d){ return d.getDate()+' '+MONTHS_SH[d.getMonth()]; }

function getWeekDates(off=0){
  const n=new Date(); n.setHours(0,0,0,0);
  const dow=n.getDay(); 
  const mon=new Date(n); mon.setDate(n.getDate()-(dow===0?6:dow-1)+off*7);
  return Array.from({length:5},(_,i)=>{ const d=new Date(mon); d.setDate(mon.getDate()+i); return d; });
}

function savePers(){ localStorage.setItem('vc_persons_v3', JSON.stringify(persons)); }
function mkInitials(name){ const p=name.trim().split(' '); return (p.length>=2?(p[0][0]+p[1][0]):name.slice(0,2)).toUpperCase(); }
function avStyle(pi){ const c=AV_COLORS[pi%AV_COLORS.length]; return `background:${c.bg};color:${c.fg};`; }

function toast(msg,dur=3000){
  const el=document.getElementById('toast');
  el.textContent=msg; el.classList.add('show');
  clearTimeout(el._t); el._t=setTimeout(()=>el.classList.remove('show'),dur);
}

function closeModal(id){ document.getElementById(id).classList.remove('open'); }
function closeOut(e,id){ if(e.target===document.getElementById(id)) closeModal(id); }

// SUPABASE
// ══════════════════════════════════════════
async function sb(path, opts={}){
  const {prefer, headers:extraH, ...rest} = opts;
  const res = await fetch(SB_URL+'/rest/v1/'+path, {
    ...rest,
    headers:{
      'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY,
      'Content-Type':'application/json',
      'Prefer': prefer||'return=representation',
      ...(extraH||{})
    }
  });
  if(!res.ok){ const e=await res.text(); throw new Error(e); }
  const t=await res.text(); return t?JSON.parse(t):[];
}

async function loadDB(retry=3){
  try{
    const [dbT,dbA]=await Promise.all([
      sb('tasks?select=*&order=created_at.asc'),
      sb('absences?select=*')
    ]);
    tasks=dbT.map(t=>({
      id:t.id, name:t.name, designer:t.designer,
      start:t.start_date, end:t.end_date,
      hours:parseFloat(t.hours)||DEF_H,
      bxId:t.bx_id||null, done:t.done||false,
      status:t.status||'Новые'
    }));
    absences={};
    dbA.forEach(a=>{ absences[a.designer+'_'+a.date]=a.id; });
    _schedCache.clear();
    setSyncStatus(true);
  }catch(e){
    if(retry>0){ await new Promise(r=>setTimeout(r,2500)); return loadDB(retry-1); }
    setSyncStatus(false);
    console.error('DB error',e);
  }
}

function setSyncStatus(ok){
  document.getElementById('sync-dot').className='sync-dot'+(ok?'':' err');
  document.getElementById('sync-txt').textContent=ok?'синхронизировано':'ошибка подключения';
  document.getElementById('hdr-sub').textContent='обновлено '+new Date().toLocaleTimeString('ru',{hour:'2-digit',minute:'2-digit'});
}

// ══════════════════════════════════════════
// SCHEDULER
// Smart: don't split tasks ≤2h, split >2h into 2-3h chunks
// Parallel tasks with same deadline
// ══════════════════════════════════════════
function buildSchedule(pi, activeTasks){
  const key = pi+'|'+activeTasks.map(t=>t.id+'@'+t.hours+'@'+t.end).join(',');
  if(_schedCache.has(key)) return _schedCache.get(key);

  const td = today();
  const tdStr = fmt(td);

  // Build list of available workdays
  const workdays=[];
  for(let i=0;i<90;i++){
    const d=new Date(td); d.setDate(td.getDate()+i);
    const ds=fmt(d), dow=d.getDay();
    if(dow>=1&&dow<=5&&!absences[pi+'_'+ds]) workdays.push(ds);
  }

  // dayLoad tracks how many hours already scheduled per day
  const dayLoad={};
  workdays.forEach(ds=>dayLoad[ds]=0);

  // Sort: smallest hours first (don't split small ones), then by deadline
  const sorted=[...activeTasks].sort((a,b)=>{
    // prioritize sooner deadlines
    if(a.end!==b.end) return a.end.localeCompare(b.end);
    return a.hours-b.hours;
  });

  const sched={};

  sorted.forEach(t=>{
    sched[t.id]={};
    const h=Math.max(parseFloat(t.hours)||DEF_H, 0.5);
    const taskEnd=t.end>=tdStr?t.end:tdStr; // if overdue, schedule from today
    const taskStart=t.start&&t.start>=tdStr?t.start:tdStr;

    // Available days within task range
    const range=workdays.filter(ds=>ds>=taskStart&&ds<=taskEnd);
    const days=range.length>0?range:workdays.slice(0,14); // fallback

    if(h<=2){
      // Don't split — place whole task in first available day with room
      for(const ds of days){
        const free=MAX_H-dayLoad[ds];
        if(free>=h){
          sched[t.id][ds]=h;
          dayLoad[ds]+=h;
          break;
        }
      }
      // If no room found, place in first day anyway (overflow)
      if(!Object.keys(sched[t.id]).length && days.length){
        const ds=days[0];
        sched[t.id][ds]=h;
        dayLoad[ds]+=h;
      }
    } else {
      // Split into chunks of 2-3h
      const nDays=days.length||1;
      // Ideal: spread evenly, min 2h per day, max 3h per day
      const idealPerDay=Math.min(3, Math.max(2, Math.ceil(h/nDays)));
      let remaining=h;
      for(const ds of days){
        if(remaining<=0) break;
        const free=MAX_H-dayLoad[ds];
        if(free<0.5) continue;
        const chunk=Math.min(idealPerDay, remaining, free);
        if(chunk<0.5) continue;
        sched[t.id][ds]=Math.round(chunk*10)/10;
        dayLoad[ds]+=chunk;
        remaining=Math.round((remaining-chunk)*10)/10;
      }
      // Spill overflow
      if(remaining>0.1){
        for(const ds of workdays){
          if(remaining<=0) break;
          const free=MAX_H-dayLoad[ds];
          if(free<0.5) continue;
          const chunk=Math.min(3,remaining,free);
          sched[t.id][ds]=(sched[t.id][ds]||0)+Math.round(chunk*10)/10;
          dayLoad[ds]+=chunk;
          remaining=Math.round((remaining-chunk)*10)/10;
        }
      }
    }
  });

  _schedCache.set(key,sched);
  return sched;
}

// ══════════════════════════════════════════
// RENDER
// ══════════════════════════════════════════
function render(){
  _schedCache.clear();
  const wk=getWeekDates(weekOff);
  document.getElementById('week-lbl').textContent=fmtDate(wk[0])+'–'+fmtDate(wk[4]);

  // Dept tabs
  renderDeptTabs();
  // Summary
  renderSummary(wk);
  // Main content
  renderMain(wk);
  // Title
  const dm=DEPT_MAP[curDept];
  document.getElementById('hdr-title').textContent=curDept==='overview'?'Загрузка команды':`${dm?.icon||''} ${dm?.label||curDept}`;
}

function renderDeptTabs(){
  const bar=document.getElementById('dept-bar');
  const tabs=[{id:'overview',label:'Обзор',icon:'📋'},...DEPTS];
  bar.innerHTML=tabs.map(d=>{
    const cnt=d.id==='overview'?tasks.filter(t=>!t.done&&!DONE_ST.includes(t.status)).length:
      tasks.filter(t=>{ const p=persons[t.designer]; return p&&p.dept===d.id&&!t.done&&!DONE_ST.includes(t.status); }).length;
    return `<button class="dept-tab${curDept===d.id?' active':''}" onclick="setDept('${d.id}')">
      ${d.icon} ${d.label}<span class="dept-badge">${cnt||''}</span>
    </button>`;
  }).join('');
}

function renderSummary(wk){
  const deptPersons=curDept==='overview'?persons:persons.filter(p=>p.dept===curDept);
  const tdStr=todayStr();
  let totalTasks=0,totalWeekH=0,todayH=0,activeCntD=0,activeCntW=0,freeNames=[];

  deptPersons.forEach((p,li)=>{
    const pi=persons.indexOf(p);
    const active=tasks.filter(t=>t.designer===pi&&!t.done&&!DONE_ST.includes(t.status)&&!APPROVAL_ST.includes(t.status)&&!POSTPONED_ST.includes(t.status));
    totalTasks+=active.length;
    const sched=buildSchedule(pi,active);
    let wH=0; wk.forEach(wd=>{ active.forEach(t=>{ wH+=sched[t.id]?.[fmt(wd)]??0; }); });
    if(!absences[pi+'_'+wk[0].toISOString().slice(0,10)]){ totalWeekH+=wH; activeCntW++; }
    if(!absences[pi+'_'+tdStr]){
      let dH=0; active.forEach(t=>{ dH+=sched[t.id]?.[tdStr]??0; });
      todayH+=dH; activeCntD++;
      if(dH<WORK_H) freeNames.push(p.name);
    }
  });

  const dayPct=activeCntD>0?Math.round(todayH/(activeCntD*MAX_H)*100):0;
  const weekPct=activeCntW>0?Math.round(totalWeekH/(activeCntW*5*MAX_H)*100):0;
  const dCol=dayPct>100?'var(--red)':dayPct>75?'var(--amber)':'var(--green)';
  const wCol=weekPct>100?'var(--red)':weekPct>75?'var(--amber)':'var(--green)';

  document.getElementById('summary').innerHTML=`
    <div class="sum-card">
      <div class="sum-lbl">Задач в работе</div>
      <div class="sum-val">${totalTasks}</div>
      <div class="sum-sub">у ${deptPersons.length} сотрудников</div>
    </div>
    <div class="sum-card">
      <div class="sum-lbl">Загрузка сегодня</div>
      <div class="sum-val" style="color:${dCol}">${activeCntD?dayPct+'%':'—'}</div>
      <div class="sum-sub">${activeCntD?fmtH(todayH)+' / '+fmtH(activeCntD*MAX_H):''}</div>
      <div class="load-track"><div class="load-fill" style="width:${Math.min(dayPct,100)}%;background:${dCol}"></div></div>
    </div>
    <div class="sum-card">
      <div class="sum-lbl">Загрузка недели</div>
      <div class="sum-val" style="color:${wCol}">${activeCntW?weekPct+'%':'—'}</div>
      <div class="sum-sub">${activeCntW?fmtH(Math.round(totalWeekH))+' / '+fmtH(activeCntW*5*MAX_H):''}</div>
      <div class="load-track"><div class="load-fill" style="width:${Math.min(weekPct,100)}%;background:${wCol}"></div></div>
    </div>
    <div class="sum-card">
      <div class="sum-lbl">Свободны сегодня</div>
      <div class="sum-val">${freeNames.length}</div>
      <div class="sum-sub">${freeNames.slice(0,3).join(', ')||'Все заняты'}</div>
    </div>`;
}

function renderMain(wk){
  const content=document.getElementById('main-content');
  if(curDept==='overview'){
    content.innerHTML=renderOverview(wk);
  } else {
    const deptP=persons.filter(p=>p.dept===curDept);
    if(!deptP.length){
      content.innerHTML=`<div style="text-align:center;padding:48px 0;color:var(--t3);font-size:13px;">Нет участников в этом отделе<br><br><button class="btn btn-ghost" onclick="openTeam()" style="margin-top:8px;">+ Добавить</button></div>`;
      return;
    }
    content.innerHTML=deptP.map(p=>renderPersonCard(p,wk)).join('');
  }
}

function renderOverview(wk){
  const tdStr=todayStr();
  const mainDepts=DEPTS.filter(d=>d.id!=='manager');
  let html='<div class="overview-grid">';
  mainDepts.forEach(d=>{
    const dp=persons.filter(p=>p.dept===d.id);
    html+=`<div class="ov-dept-card" style="border-top:3px solid ${d.color}">
      <div class="ov-dept-title">${d.icon} ${d.label}</div>`;
    if(!dp.length){html+='<div style="font-size:11px;color:var(--t3)">Нет участников</div>';}
    dp.forEach(p=>{
      const pi=persons.indexOf(p);
      const active=tasks.filter(t=>t.designer===pi&&!t.done&&!DONE_ST.includes(t.status)&&!APPROVAL_ST.includes(t.status)&&!POSTPONED_ST.includes(t.status));
      const sched=buildSchedule(pi,active);
      let wH=0; wk.forEach(wd=>{ active.forEach(t=>{ wH+=sched[t.id]?.[fmt(wd)]??0; }); });
      const pct=Math.min(100,Math.round(wH/(5*MAX_H)*100));
      const col=pct>100?'var(--red)':pct>75?'var(--amber)':'var(--green)';
      const dotCol=absences[pi+'_'+tdStr]?'var(--t3)':col;
      html+=`<div class="ov-person" onclick="setDept('${d.id}')">
        <div class="ov-avatar" style="${avStyle(pi)}">${p.initials||p.name.slice(0,2)}</div>
        <div class="ov-name">${p.name}</div>
        <div class="ov-bar"><div class="ov-bar-fill" style="width:${pct}%;background:${col}"></div></div>
        <div class="ov-pct" style="color:${col}">${pct}%</div>
        <div class="ov-dot" style="background:${dotCol}"></div>
      </div>`;
    });
    html+='</div>';
  });
  html+='</div>';
  // Manager row
  const mgrs=persons.filter(p=>p.dept==='manager');
  if(mgrs.length){
    html+=`<div style="margin-top:12px;background:var(--s1);border:1px solid var(--b1);border-radius:var(--r);padding:14px 16px;">
      <div class="ov-dept-title">👑 Руководство</div>
      <div style="display:flex;gap:16px;flex-wrap:wrap;">`;
    mgrs.forEach(p=>{
      const pi=persons.indexOf(p);
      html+=`<div style="display:flex;align-items:center;gap:8px;">
        <div class="ov-avatar" style="${avStyle(pi)};width:28px;height:28px;font-size:9px;">${p.initials||p.name.slice(0,2)}</div>
        <div style="font-size:12px;font-weight:500;">${p.name}</div>
      </div>`;
    });
    html+='</div></div>';
  }
  return html;
}

function renderPersonCard(p, wk){
  const pi=persons.indexOf(p);
  const allTasks=tasks.filter(t=>t.designer===pi&&!t.done&&!DONE_ST.includes(t.status));
  const planTasks=allTasks.filter(t=>!APPROVAL_ST.includes(t.status)&&!POSTPONED_ST.includes(t.status));
  const approvalTasks=allTasks.filter(t=>APPROVAL_ST.includes(t.status));
  const postponedTasks=allTasks.filter(t=>POSTPONED_ST.includes(t.status));
  const sched=buildSchedule(pi,planTasks);
  const tdStr=todayStr();

  // Day hours
  const dayH=wk.map(wd=>{
    const ds=fmt(wd);
    if(absences[pi+'_'+ds]) return -1;
    let h=0; planTasks.forEach(t=>{ h+=sched[t.id]?.[ds]??0; });
    return Math.round(h*10)/10;
  });

  let weekTotal=0; dayH.forEach(h=>{ if(h>=0) weekTotal+=h; });
  weekTotal=Math.round(weekTotal*10)/10;

  const allAbsent=dayH.every(h=>h===-1);
  const maxH=Math.max(...dayH.filter(h=>h>=0),0);
  const cardClass=!allAbsent&&maxH>MAX_H?'overload':!allAbsent&&maxH>=WORK_H?'warn':'';
  const statusTxt=allAbsent?'Отсутствует':maxH>MAX_H?'Перегружен(а)':maxH>=WORK_H?'Загружен(а)':'Есть место';
  const pillCls=allAbsent?'pill-gray':maxH>MAX_H?'pill-red':maxH>=WORK_H?'pill-amber':'pill-green';
  const bodyId='pb-'+pi;
  const isCollapsed=collapsed[bodyId]!==false; // default collapsed

  // Mini day bars
  const miniDays=wk.map((wd,i)=>{
    const h=dayH[i], abs=h===-1, past=isPast(fmt(wd)), tod=isToday(fmt(wd));
    const pct=abs||h<=0?0:Math.min(100,h/MAX_H*100);
    const col=h>MAX_H?'var(--red)':h>=WORK_H?'var(--amber)':'var(--green)';
    return `<div class="day-mini">
      <div class="day-mini-lbl">${DAYS_SHORT[i]}</div>
      <div class="day-mini-bar" style="${tod?'background:rgba(129,140,248,.15);':past?'opacity:.35;':''}">
        <div class="day-mini-fill" style="height:${pct}%;background:${abs?'transparent':col}"></div>
      </div>
      <div class="day-mini-h" style="color:${abs?'var(--t3)':col}">${abs?'—':h<=0?'—':fmtH(h)}</div>
    </div>`;
  }).join('');

  // Approval / postponed chips
  let chips='';
  if(approvalTasks.length) chips+=`<div class="info-chip chip-amber">🔄 ${approvalTasks.length} на согласовании · ~${fmtH(approvalTasks.length*0.5)} на правки</div>`;
  if(postponedTasks.length) chips+=`<div class="info-chip chip-gray">⏸ ${postponedTasks.length} отложено</div>`;

  // Approval tasks list
  let approvalList='';
  if(approvalTasks.length){
    approvalList=approvalTasks.map(t=>`<div style="font-size:11px;color:var(--t2);padding:2px 0 2px 16px;">• ${t.name} — ~30 мин на правки</div>`).join('');
  }

  return `<div class="person-card ${cardClass}" id="card-${pi}">
    <div class="person-hdr" onclick="toggleCard(${pi})">
      <div class="avatar" style="${avStyle(pi)}">${p.initials||p.name.slice(0,2)}</div>
      <div style="flex:1;min-width:0;">
        <div class="person-name">${p.name} <span class="chevron" id="chv-${pi}">${isCollapsed?'›':'⌄'}</span></div>

function renderGantt(pi, planTasks, wk, sched, dayH){
  const tdStr=todayStr();

  // Day column headers
  const dayHdrs=wk.map((wd,i)=>{
    const ds=fmt(wd);
    const h=dayH[i], absent=h===-1, past=isPast(ds), tod=isToday(ds);
    const pct=(!absent&&h>0)?Math.min(100,Math.round(h/MAX_H*100)):0;
    const col=h>MAX_H?'var(--red)':h>=WORK_H?'var(--amber)':'var(--green)';
    const cls=absent?'no-work':past?'past':tod?'today':'';
    return `<div class="day-col-hdr ${cls}">
      <div class="day-hdr-name">${DAYS_SHORT[i]}</div>
      <div class="day-hdr-date">${wd.getDate()}</div>
      <div class="day-hdr-load" style="color:${absent||h<=0?'var(--t3)':col}">${absent?'нет':h<=0?'—':fmtH(h)}</div>
      <div class="day-hdr-pct">${pct?pct+'%':''}</div>
      <div class="day-hdr-bar"><div class="day-hdr-bar-fill" style="width:${pct}%;background:${col}"></div></div>
    </div>`;
  }).join('');

  if(!planTasks.length){
    return `<div class="days-hdr"><div class="day-col-hdr"></div>${dayHdrs}</div>
      <div style="text-align:center;padding:16px;font-size:11px;color:var(--t3);">Нет задач в плане</div>`;
  }

  // Build gantt rows - one per task
  // For each task, show bar in days where it has scheduled hours
  const taskRows=planTasks.map((t,li)=>{
    const color=TASK_COLORS[tasks.indexOf(t)%TASK_COLORS.length];
    const tIdx=tasks.indexOf(t);
    const isTodays=t.end===tdStr;
    const isOverdue=t.end<tdStr;
    const dlDiff=Math.round((new Date(t.end+'T00:00:00')-today())/86400000);
    const dlLabel=isOverdue?'🔥 просрочена':dlDiff===0?'🔥 сегодня':dlDiff<=3?`⚡ ${dlDiff}д`:'';

    const bars=wk.map((wd,i)=>{
      const ds=fmt(wd);
      const h=sched[t.id]?.[ds]??0;
      const past=isPast(ds);
      if(!h) return `<div class="gantt-day-col${isToday(ds)?' today':past?' past':''}"></div>`;
      return `<div class="gantt-day-col${isToday(ds)?' today':past?' past':''}">
        <div class="gantt-bar${isTodays||isOverdue?' fire':''}" 
          style="background:${color};${isOverdue?'opacity:.7;outline:1px solid var(--red);':''}"
          onclick="showTask(${tIdx})" title="${t.name} · ${fmtH(h)}">
          <span class="gantt-bar-name">${t.name}</span>
          <span class="gantt-bar-h">${fmtH(h)}</span>
        </div>
      </div>`;
    }).join('');

    const labelEl=`<div class="gantt-task-label" onclick="showTask(${tIdx})" title="${t.name}">
      <span style="width:8px;height:8px;border-radius:50%;background:${color};flex-shrink:0;display:inline-block;margin-right:6px;"></span>
      ${t.name.length>14?t.name.slice(0,13)+'…':t.name}
      ${dlLabel?`<span style="font-size:9px;color:var(--red);margin-left:4px;">${dlLabel}</span>`:''}
    </div>`;

    return {label:labelEl, bars};
  });

  const labels=taskRows.map(r=>r.label).join('');
  const dayGrids=wk.map((_,di)=>{
    return `<div style="display:flex;flex-direction:column;gap:2px;padding:2px 3px;border-left:1px solid var(--b1);${isToday(fmt(wk[di]))?'background:rgba(129,140,248,.03)':''}">
      ${planTasks.map((t,li)=>{
        const ds=fmt(wk[di]);
        const h=sched[t.id]?.[ds]??0;
        const color=TASK_COLORS[tasks.indexOf(t)%TASK_COLORS.length];
        const tIdx=tasks.indexOf(t);
        const isTodays=t.end===tdStr, isOverdue=t.end<tdStr;
        if(!h) return `<div style="height:28px;"></div>`;
        return `<div class="gantt-bar${isTodays||isOverdue?' fire':''}" 
          style="background:${color};${isOverdue?'outline:1px solid var(--red);opacity:.75;':''}"
          onclick="showTask(${tIdx})">
          <span class="gantt-bar-name">${t.name}</span>
          <span class="gantt-bar-h">${fmtH(h)}</span>
        </div>`;
      }).join('')}
    </div>`;
  }).join('');

  return `<div class="days-hdr"><div class="day-col-hdr"></div>${dayHdrs}</div>
    <div class="gantt-area">
      <div class="gantt-grid">
        <div class="gantt-label-col">${labels}</div>
        ${dayGrids}
      </div>
    </div>`;
}

function showTask(tIdx){
  const t=tasks[tIdx]; if(!t) return;
  const p=persons[t.designer];
  const wk=getWeekDates(weekOff);
  const planActive=tasks.filter(tt=>tt.designer===t.designer&&!tt.done&&!DONE_ST.includes(tt.status)&&!APPROVAL_ST.includes(tt.status)&&!POSTPONED_ST.includes(tt.status));
  const sched=buildSchedule(t.designer,planActive);
  const color=TASK_COLORS[tIdx%TASK_COLORS.length];
  const dlDiff=Math.round((new Date(t.end+'T00:00:00')-today())/86400000);
  const dlTxt=dlDiff<0?`🔥 просрочена ${Math.abs(dlDiff)}д`:dlDiff===0?'🔥 дедлайн сегодня':`${dlDiff} дн. до дедлайна`;
  const isApproval=APPROVAL_ST.includes(t.status);
  const isPostponed=POSTPONED_ST.includes(t.status);

  const weekRows=wk.map((wd,i)=>{
    const h=sched[t.id]?.[fmt(wd)]??0;
    if(!h&&!isApproval&&!isPostponed) return '';
    const pct=Math.min(100,h/WORK_H*100);
    return `<div class="tp-day-row">
      <div class="tp-day-name">${DAYS_SHORT[i]}</div>
      <div class="tp-day-bar"><div class="tp-day-fill" style="width:${pct}%;background:${color}"></div></div>
      <div class="tp-day-h">${h?fmtH(h):'—'}</div>
    </div>`;
  }).join('');

  const statusInPlan=!isApproval&&!isPostponed&&!t.done;

  document.getElementById('task-popup-body').innerHTML=`
    <div class="tp-header">
      <div class="tp-dot" style="background:${color}"></div>
      <div>
        <div class="tp-title">${t.name}</div>
        <div class="tp-badges">
          <span class="tp-badge" style="color:${dlDiff<0?'var(--red)':dlDiff<=3?'var(--amber)':'var(--t2)'};border-color:currentColor;background:transparent;">${dlTxt}</span>
          <span class="tp-badge" style="color:var(--t2);border-color:var(--b2);">${t.status||'Новые'}</span>
          ${p?`<span class="tp-badge" style="color:var(--t2);border-color:var(--b2);">→ ${p.name}</span>`:''}
        </div>
      </div>
    </div>
    ${isApproval?`<div style="background:var(--amber-bg);border:1px solid var(--amber-b);border-radius:var(--r);padding:10px 13px;font-size:12px;color:var(--amber);margin-bottom:12px;">🔄 На согласовании — задача не в плане. Заложен буфер ~30 мин на правки.</div>`:''}
    ${isPostponed?`<div style="background:var(--s2);border:1px solid var(--b1);border-radius:var(--r);padding:10px 13px;font-size:12px;color:var(--t2);margin-bottom:12px;">⏸ Отложена — задача не в плане.</div>`:''}
    ${statusInPlan?`<div class="tp-week"><div class="tp-week-lbl">Нагрузка на неделе</div>${weekRows||'<div style="font-size:11px;color:var(--t3)">Нет нагрузки на этой неделе</div>'}<div style="margin-top:8px;padding-top:8px;border-top:1px solid var(--b1);font-size:11px;color:var(--t2);">Итого плановых: ${fmtH(t.hours)}</div></div>`:''}
    <div class="tp-dl-row">
      <label>Дедлайн:</label>
      <input type="date" value="${t.end}" class="form-input" style="flex:1;font-size:12px;padding:6px 10px;" onchange="updDeadline(${tIdx},this.value)">
      <label style="margin-left:8px;">Часы:</label>
      <input type="number" value="${t.hours}" min="0.5" max="200" step="0.5" class="form-input" style="width:70px;font-size:12px;padding:6px 8px;" onchange="updHours(${tIdx},this.value)">
    </div>
    <div class="tp-actions">
      ${isApproval
        ? `<button class="tp-action-btn blue" onclick="setStatus(${tIdx},'Создание')">↩ Вернуть в работу</button>`
        : `<button class="tp-action-btn amber" onclick="setStatus(${tIdx},'Согласование')">🔄 На согласование</button>`
      }
      ${!t.done?`<button class="tp-action-btn green" onclick="doneTask(${tIdx})">✓ Закрыть</button>`:''}
    </div>`;

  document.getElementById('modal-task').classList.add('open');
}

async function updDeadline(tIdx,val){
  const t=tasks[tIdx]; if(!t) return;
  t.end=val; _schedCache.clear(); render();
  try{ await sb('tasks?id=eq.'+t.id,{method:'PATCH',body:JSON.stringify({end_date:val}),prefer:'return=minimal'}); }catch(e){}
}
async function updHours(tIdx,val){
  const h=parseFloat(val); if(!h||h<0.5) return;
  tasks[tIdx].hours=h; _schedCache.clear(); render();
  try{ await sb('tasks?id=eq.'+tasks[tIdx].id,{method:'PATCH',body:JSON.stringify({hours:h}),prefer:'return=minimal'}); }catch(e){}
}
async function setStatus(tIdx,status){
  tasks[tIdx].status=status; _schedCache.clear();
  closeModal('modal-task'); render();
  try{ await sb('tasks?id=eq.'+tasks[tIdx].id,{method:'PATCH',body:JSON.stringify({status}),prefer:'return=minimal'}); }catch(e){}
}
async function doneTask(tIdx){
  tasks[tIdx].done=true; _schedCache.clear();
  closeModal('modal-task'); render();
  try{ await sb('tasks?id=eq.'+tasks[tIdx].id,{method:'PATCH',body:JSON.stringify({done:true}),prefer:'return=minimal'}); }catch(e){}
}

function bxStep(n){ document.querySelectorAll('.bx-step').forEach((el,i)=>el.classList.toggle('active',i===n-1)); }

async function bxLoad(){
  const wh=document.getElementById('bx-url').value.trim().replace(/\/$/,'')+'/';
  localStorage.setItem('bx_wh',wh);
  const groups={};
  DEPTS.filter(d=>d.id!=='manager').forEach(d=>{ const el=document.getElementById('bxg-'+d.id); if(el&&el.value.trim()) groups[d.id]=el.value.trim(); });
  localStorage.setItem('bx_groups',JSON.stringify(groups));
  const days=parseInt(document.getElementById('bx-days').value);
  bxStep(2);
  try{
    const td=new Date(), fut=new Date(td.getTime()+days*86400000);
    const fmtBx=d=>d.toISOString().slice(0,10)+'T00:00:00+03:00';
    let all=[];
    const dkeys=Object.keys(groups);
    if(!dkeys.length){
      const p=new URLSearchParams();
      ['ID','TITLE','DEADLINE','CREATED_DATE','TIME_ESTIMATE','RESPONSIBLE_ID','RESPONSIBLE','STATUS','GROUP_ID'].forEach(f=>p.append('select[]',f));
      p.set('filter[>=DEADLINE]',fmtBx(td)); p.set('filter[<=DEADLINE]',fmtBx(fut));
      p.set('filter[STATUS][]','2'); p.append('filter[STATUS][]','3'); p.append('filter[STATUS][]','4'); p.append('filter[STATUS][]','6'); p.append('filter[STATUS][]','7');
      p.set('order[DEADLINE]','ASC'); p.set('limit','100');
      const r=await fetch(wh+'tasks.task.list?'+p);
      const d=await r.json(); if(d.error) throw new Error(d.error_description);
      all=(d.result?.tasks||[]).map(t=>({...t,_dept:null}));
    } else {
      for(const [dept,gid] of Object.entries(groups)){
        const p=new URLSearchParams();
        ['ID','TITLE','DEADLINE','CREATED_DATE','TIME_ESTIMATE','RESPONSIBLE_ID','RESPONSIBLE','STATUS','GROUP_ID'].forEach(f=>p.append('select[]',f));
        p.set('filter[>=DEADLINE]',fmtBx(td)); p.set('filter[<=DEADLINE]',fmtBx(fut));
        p.set('filter[STATUS][]','2'); p.append('filter[STATUS][]','3'); p.append('filter[STATUS][]','4'); p.append('filter[STATUS][]','6'); p.append('filter[STATUS][]','7');
        p.set('filter[GROUP_ID]',gid); p.set('order[DEADLINE]','ASC'); p.set('limit','100');
        try{ const r=await fetch(wh+'tasks.task.list?'+p); const d=await r.json(); (d.result?.tasks||[]).forEach(t=>all.push({...t,_dept:dept})); }catch(e){}
      }
      const seen=new Set(); all=all.filter(t=>{ if(seen.has(t.id)) return false; seen.add(t.id); return true; });
    }
    bxRaw=all; bxFetchedDepts=groups;
    if(!all.length){ document.querySelector('#bx-s2 div').textContent='Задачи не найдены.'; return; }
    // User map
    const users={};
    all.forEach(t=>{ if(t.responsible) users[t.responsible.id]=t.responsible.name||('Польз.'+t.responsible.id); });
    const savedMap=JSON.parse(localStorage.getItem('bx_umap')||'{}');
    document.getElementById('bx-user-map').innerHTML=Object.entries(users).map(([uid,un])=>`
      <div style="display:flex;align-items:center;gap:9px;margin-bottom:7px;">
        <span style="flex:1;font-size:12px;color:var(--t2)">${un}</span>
        <select class="form-select" id="bxm-${uid}" style="flex:1;padding:5px 9px;font-size:12px;">
          <option value="">— не импортировать —</option>
          ${persons.map((p,i)=>`<option value="${i}"${savedMap[uid]==i?' selected':''}>${p.name}</option>`).join('')}
        </select>
      </div>`).join('')||'<div style="font-size:12px;color:var(--t2)">Ответственные не найдены</div>';
    // Task list grouped
    const byDept={};
    all.forEach((t,i)=>{ const d=t._dept||'other'; if(!byDept[d]) byDept[d]=[]; byDept[d].push({t,i}); });
    let html='';
    Object.entries(byDept).forEach(([dept,items])=>{
      const dm=DEPT_MAP[dept]; if(dm) html+=`<div style="font-size:10px;color:${dm.color};padding:8px 0 4px;font-weight:600;">${dm.icon} ${dm.label} (${items.length})</div>`;
      html+=items.map(({t,i})=>{
        const est=t.timeEstimate?Math.round(t.timeEstimate/3600*10)/10:null;
        const dl=t.deadline?new Date(t.deadline).toLocaleDateString('ru',{day:'numeric',month:'short'}):'без срока';
        return `<div class="import-row"><input type="checkbox" id="bxc-${i}" value="${i}" checked>
          <div class="import-info"><div class="import-name">${t.title}</div>
          <div class="import-meta">Срок: ${dl} · ${t.responsible?.name||''} ${est?' · '+est+' ч':' · ⚠ нет оценки'}</div></div></div>`;
      }).join('');
    });
    document.getElementById('bx-task-list').innerHTML=html;
    document.getElementById('bx-all').checked=true;
    bxStep(3);
  }catch(e){
    document.querySelector('#bx-s2 div').innerHTML=`<span style="color:var(--red)">⚠ ${e.message}</span><br><small style="color:var(--t2)">Проверьте URL и права tasks.* Возможен CORS.</small>`;
  }
}

function bxSelAll(cb){ document.querySelectorAll('#bx-task-list input[type=checkbox]').forEach(c=>c.checked=cb.checked); }

async function bxImport(){
  const checked=[...document.querySelectorAll('#bx-task-list input[type=checkbox]:checked')].map(c=>parseInt(c.value));
  if(!checked.length){ toast('Выберите задачи'); return; }
  const btn=document.querySelector('#bx-s3 .btn-save'); btn.textContent='Сохраняю...'; btn.disabled=true;
  const umap={};
  document.querySelectorAll('[id^="bxm-"]').forEach(el=>{ const uid=el.id.replace('bxm-',''); if(el.value!=='') umap[uid]=parseInt(el.value); });
  localStorage.setItem('bx_umap',JSON.stringify(umap));

  // Map BX status → our status
  const stMap={'1':'Новые','2':'Очередь в работу','3':'Создание','4':'Отложено','5':'Завершена','6':'Согласование','7':'Ждёт контроля'};
  const toInsert=[], toUpdate=[];
  const fileIds=new Set();

  checked.forEach(i=>{
    const t=bxRaw[i]; if(!t) return;
    const di=umap[t.responsible?.id]; if(di===undefined) return;
    const bxId='bx_'+t.id;
    fileIds.add(bxId);
    const dl=t.deadline?t.deadline.slice(0,10):fmt(today());
    const cr=t.createdDate?t.createdDate.slice(0,10):fmt(today());
    const hours=t.timeEstimate?Math.round(t.timeEstimate/3600*10)/10:DEF_H;
    const status=stMap[t.status]||'Новые';
    const existing=tasks.find(tt=>tt.bxId===bxId);
    if(existing){ toUpdate.push({task:existing,name:t.title,designer:di,start:cr,end:dl,hours,status}); }
    else { toInsert.push({name:t.title,designer:di,start_date:cr,end_date:dl,hours,bx_id:bxId,done:false,status}); }
  });

  let added=0,updated=0;
  try{
    if(toInsert.length){
      const res=await sb('tasks',{method:'POST',body:JSON.stringify(toInsert),prefer:'return=representation,resolution=ignore-duplicates',headers:{'Prefer':'return=representation,resolution=ignore-duplicates'}});
      res.forEach(t=>{ tasks.push({id:t.id,name:t.name,designer:t.designer,start:t.start_date,end:t.end_date,hours:parseFloat(t.hours),bxId:t.bx_id,done:false,status:t.status}); added++; });
    }
    for(const {task,name,designer,start,end,hours,status} of toUpdate){
      if(task.name===name&&task.end===end&&task.hours===hours&&task.status===status&&task.designer===designer) continue;
      Object.assign(task,{name,designer,start,end,hours,status}); updated++;
      try{ await sb('tasks?id=eq.'+task.id,{method:'PATCH',body:JSON.stringify({name,designer,start_date:start,end_date:end,hours,status}),prefer:'return=minimal'}); }catch(e){}
    }
    const parts=[];
    if(added) parts.push(`+${added} новых`);
    if(updated) parts.push(`↻ ${updated} обновлено`);
    document.getElementById('bx-done').textContent=`✓ ${parts.join(' · ')||'Без изменений'}`;
    _schedCache.clear(); bxStep(4); render();
  }catch(e){ toast('Ошибка: '+e.message); }
  finally{ btn.textContent='Импортировать'; btn.disabled=false; }
}

  if(!Object.keys(umap).length) return;
  try{
    const td=new Date(), fut=new Date(td.getTime()+30*86400000);
    const fmtBx=d=>d.toISOString().slice(0,10)+'T00:00:00+03:00';
    const stMap={'1':'Новые','2':'Очередь в работу','3':'Создание','4':'Отложено','5':'Завершена','6':'Согласование','7':'Ждёт контроля'};
    let all=[];
    const gkeys=Object.keys(groups);
    if(!gkeys.length){

      p.set('filter[>=DEADLINE]',fmtBx(td)); p.set('filter[<=DEADLINE]',fmtBx(fut));
      ['2','3','4','6','7'].forEach(s=>p.append('filter[STATUS][]',s));
      Object.keys(umap).forEach(uid=>p.append('filter[RESPONSIBLE_ID][]',uid));
      p.set('limit','100');
      const r=await fetch(wh+'tasks.task.list?'+p); if(!r.ok) return;
      const d=await r.json(); all=d.result?.tasks||[];
    } else {
      for(const [dept,gid] of Object.entries(groups)){
        const p=new URLSearchParams();
        ['ID','TITLE','DEADLINE','CREATED_DATE','TIME_ESTIMATE','RESPONSIBLE_ID','RESPONSIBLE','STATUS'].forEach(f=>p.append('select[]',f));
        p.set('filter[>=DEADLINE]',fmtBx(td)); p.set('filter[<=DEADLINE]',fmtBx(fut));
        ['2','3','4','6','7'].forEach(s=>p.append('filter[STATUS][]',s));
        p.set('filter[GROUP_ID]',gid); p.set('limit','100');
        try{ const r=await fetch(wh+'tasks.task.list?'+p); if(!r.ok) continue; const d=await r.json(); (d.result?.tasks||[]).forEach(t=>all.push(t)); }catch(e){}
      }
      const seen=new Set(); all=all.filter(t=>{ if(seen.has(t.id)) return false; seen.add(t.id); return true; });
    }
    let changed=false;
    const fileIds=new Set(all.map(t=>'bx_'+t.id));
    // Update existing
    for(const t of all){
      const bxId='bx_'+t.id; const di=umap[t.responsible?.id]; if(di===undefined) continue;
      const dl=t.deadline?t.deadline.slice(0,10):fmt(today());
      const hours=t.timeEstimate?Math.round(t.timeEstimate/3600*10)/10:DEF_H;
      const status=stMap[t.status]||'Новые';
      const existing=tasks.find(tt=>tt.bxId===bxId);
      if(existing){
        if(existing.status!==status||existing.end!==dl||existing.hours!==hours){
          Object.assign(existing,{status,end:dl,hours}); changed=true;
          try{ await sb('tasks?id=eq.'+existing.id,{method:'PATCH',body:JSON.stringify({status,end_date:dl,hours}),prefer:'return=minimal'}); }catch(e){}
        }
      } else {
        const cr=t.createdDate?t.createdDate.slice(0,10):fmt(today());
        try{ const res=await sb('tasks',{method:'POST',body:JSON.stringify([{name:t.title,designer:di,start_date:cr,end_date:dl,hours,bx_id:bxId,done:false,status}]),prefer:'return=representation,resolution=ignore-duplicates',headers:{'Prefer':'return=representation,resolution=ignore-duplicates'}});
          if(res.length){ tasks.push({id:res[0].id,name:t.title,designer:di,start:cr,end:dl,hours,bxId,done:false,status}); changed=true; }
        }catch(e){}
      }
    }
    if(changed){ _schedCache.clear(); render(); setSyncStatus(true); }
  }catch(e){ console.warn('AutoSync error',e); }
}

// ══════════════════════════════════════════
// TEAM MANAGEMENT
// ══════════════════════════════════════════
function openTeam(){
  const sel=document.getElementById('team-dept');
  sel.innerHTML=DEPTS.map(d=>`<option value="${d.id}">${d.icon} ${d.label}</option>`).join('');
  if(curDept!=='overview') sel.value=curDept;
  renderTeamModal();
  document.getElementById('modal-team').classList.add('open');
}

function renderTeamModal(){
  const dept=document.getElementById('team-dept').value;
  const dp=persons.filter(p=>p.dept===dept);
  const el=document.getElementById('team-list-modal');
  if(!dp.length){ el.innerHTML='<div style="font-size:12px;color:var(--t3);padding:8px 0;">Нет участников</div>'; return; }
  el.innerHTML=dp.map(p=>{
    const pi=persons.indexOf(p);
    const tc=tasks.filter(t=>t.designer===pi&&!t.done).length;
    return `<div class="team-row">
      <div class="avatar" style="${avStyle(pi)};width:28px;height:28px;font-size:9px;">${p.initials||p.name.slice(0,2)}</div>
      <div style="flex:1;"><div style="font-size:12px;font-weight:500;">${p.name}</div><div style="font-size:10px;color:var(--t2);">${tc} задач</div></div>
      <button onclick="movePerson(${pi},-1)" style="background:none;border:1px solid var(--b2);border-radius:5px;color:var(--t2);cursor:pointer;padding:2px 8px;font-size:12px;">↑</button>
      <button onclick="movePerson(${pi},1)" style="background:none;border:1px solid var(--b2);border-radius:5px;color:var(--t2);cursor:pointer;padding:2px 8px;font-size:12px;">↓</button>
      <button onclick="removePerson(${pi})" style="background:none;border:1px solid var(--red-b);border-radius:5px;color:var(--red);cursor:pointer;padding:2px 8px;font-size:11px;">Удалить</button>
    </div>`;
  }).join('');
}

function addMember(){
  const name=document.getElementById('new-name').value.trim();
  const init=(document.getElementById('new-init').value.trim().toUpperCase()||mkInitials(name));
  const dept=document.getElementById('team-dept').value;
  if(!name){ document.getElementById('new-name').focus(); return; }
  persons.push({name,initials:init,dept,active:true});
  savePers();
  document.getElementById('new-name').value=''; document.getElementById('new-init').value='';
  renderTeamModal(); render();
}

function removePerson(pi){
  if(tasks.some(t=>t.designer===pi)&&!confirm(`У ${persons[pi].name} есть задачи. Удалить?`)) return;
  persons.splice(pi,1); savePers(); renderTeamModal(); render();
}

function movePerson(pi,dir){
  const j=pi+dir; if(j<0||j>=persons.length) return;
  [persons[pi],persons[j]]=[persons[j],persons[pi]];
  savePers(); renderTeamModal(); render();
}

// ══════════════════════════════════════════
// CLEAR ALL
// ══════════════════════════════════════════
async function clearAll(){
  if(!confirm('Удалить ВСЕ задачи из базы?')) return;
  try{
    await sb('tasks?id=neq.00000000-0000-0000-0000-000000000000',{method:'DELETE',prefer:''});
    tasks=[]; _schedCache.clear(); render(); toast('Задачи удалены');
  }catch(e){ toast('Ошибка: '+e.message); }
}

// ══════════════════════════════════════════
// INIT
// ══════════════════════════════════════════
async function init(){
  await loadDB();
  document.getElementById('loader').style.display='none';
  render();
  setInterval(bxAutoSync, 5*60*1000);
  setInterval(async()=>{ await loadDB(); render(); }, 60*1000);
  bxAutoSync();
}
init();
</script>
